<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Simulator</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/square.css">
    <link rel="stylesheet" href="css/toolbar.css">
    <link rel="stylesheet" href="css/ressourcebar.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/alertbox.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="icon" type="image/png" href="assets/image/icon/favicon.png" />
</head>
<body draggable="false">
    <div class="menu-initial-container">
        <div class="menu initial-menu">
            <header class="menu-header">
                <h1>Farm Simulator</h1>
                <p>Configure your experience</p>
            </header>

            <div class="settings-grid">
                <div class="setting-item">
                    <label for="inputMapHeight">Map Height</label>
                    <div class="input-control">
                        <input id="inputMapHeight" class="slider" type="range" min="30" max="80" value="75">
                        <output>75</output>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="inputMapWidth">Map Width</label>
                    <div class="input-control">
                        <input id="inputMapWidth" class="slider" type="range" min="30" max="95" value="95">
                        <output>95</output>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="inputTimeToGrow">Grow Speed</label>
                    <div class="input-control">
                        <input id="inputTimeToGrow" class="slider" type="range" min="1" max="20" value="10">
                        <output>10</output>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="inputNaturalGen">Natural Spawn</label>
                    <div class="input-control">
                        <input id="inputNaturalGen" class="slider" type="range" min="1" max="100" value="70">
                        <output>70</output>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="inputTileSize">Tile Size</label>
                    <div class="input-control">
                        <input id="inputTileSize" class="slider" type="range" min="16" max="64" value="32" step="8">
                        <output>32</output>
                    </div>
                </div>
            </div>

            <div class="toggles-container">
                <div class="toggle-item">
                    <span>Enable Sounds</span>
                    <label class="switch">
                        <input id="inputEnableSounds" type="checkbox">
                        <span class="switch-slider"></span>
                    </label>
                </div>

                <div class="toggle-item">
                    <span>Infinite Resources</span>
                    <label class="switch">
                        <input id="inputInfiniteRes" type="checkbox" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>

            <button id="buttonPlay" class="button-start">START FARMING</button>
        </div>
    </div>

    <div id="menus"></div>

    <nav id="ressourcebar">
        <ul></ul>
    </nav>

    <div class="alert" id="alertbox" style="display: none" onclick="style.display='none';"></div>

    <nav id="toolbar">
        <ul>
            <li class="left-item" id="buttonSettings">
                <img src="assets/image/icon/settings_icon.png" alt="Settings">
                <span class="txt">Settings</span>
            </li>
            <li class="center-items">
                <div class="dropup">
                    <img src="assets/image/icon/crops_icon.png" alt="Crops icon">
                    <span class="txt">Crop</span>
                    <div id="dropup-crop" class="dropup-content"></div>
                </div>
                <div><img src="assets/image/icon/sheep_icon.png" alt="Animal icon"><span class="txt">Animal</span></div>
                <div class="dropup" >
                    <img src="assets/image/icon/fence_icon.png" alt="Fence icon">
                    <span class="txt">Fence</span>
                    <div id="dropup-fence" class="dropup-content"></div>
                </div>
            </li>
            <li class="right-item"><img src="assets/image/icon/shop_icon.png" alt="Right Icon"><span class="txt">Shop</span></li>
        </ul>
    </nav>

    <script src="src/game_manager/game_lang.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
