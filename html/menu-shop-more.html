<div class="menuShopHeader">
    <div class="menuShopHeaderMoney">
        <img src="assets/image/icon/money_icon.png">
        <span id="playerMoney">0</span>
    </div>
    <h1>Trade</h1>
    <div class="buttonClose"></div>
</div>
<div id="shopMore">
    <div id="imgElement">
        <img>
    </div>
    
    <div class="transaction-group">
        <div id="buy" class="transaction-box">
            <h3>Buy</h3>
            <div class="input-row">
                <label>Quantity</label>
                <input type="number" id="buyQuantity" name="quantity" required min="1" max="99" value="1" />
            </div>
            <div class="price-row">
                <label>Total Price:</label>
                <div style="display: flex; align-items: center;">
                    <img src="assets/image/icon/money_icon.png" style="width: 14px; height: 14px; margin-right: 4px;">
                    <output id="buyPrice">0</output>
                </div>
            </div>
            <button class="menuItem button buttonBuy">Confirm Purchase</button>
        </div>

        <div id="sell" class="transaction-box">
            <h3>Sell</h3>
            <div class="input-row">
                <label>Quantity</label>
                <input type="number" id="sellQuantity" name="quantity" required min="1" max="99" value="1" />
            </div>
            <div class="price-row">
                <label>Total Value:</label>
                <div style="display: flex; align-items: center;">
                    <img src="assets/image/icon/money_icon.png" style="width: 14px; height: 14px; margin-right: 4px;">
                    <output id="sellPrice">0</output>
                </div>
            </div>
            <button class="menuItem button buttonSell">Confirm Sale</button>
        </div>
    </div>
</div>
